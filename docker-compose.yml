services:
  db:
   image: postgres:16-alpine
   container_name: postgres-db
   ports:
     - "5436:5432"
   environment:
     POSTGRES_USER: pakin
     POSTGRES_PASSWORD: 123456789
     POSTGRES_DB: movie
   volumes:
     - postgres_data:/var/lib/postgresql/data
  cache:
     image: redis:7-alpine
     container_name: redis-cache
     ports:
       - "6380:6379"
volumes:
  postgres_data: